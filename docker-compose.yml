name: sig

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Volume anônimo existente com os dados do banco — NÃO remover
      - postgres_data:/var/lib/postgresql
      # Scripts de inicialização do banco (já existia no projeto)
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-app_user} -d ${POSTGRES_DB:-sig_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sig_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:  postgresql://${APP_DB_USER}:${APP_DB_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      PORT:          ${APP_PORT}
      NODE_ENV:      ${NODE_ENV}
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRES:   ${JWT_EXPIRES}
      APP_USERNAME:  ${APP_USERNAME}
      APP_PASSWORD:  ${APP_PASSWORD}
      CORS_ORIGIN:   ${CORS_ORIGIN}
    ports:
      - "${APP_PORT}:3001"
      - "55550:5555"
    
    networks:
      - sig_network

volumes:
  postgres_data:
    # Aponta para o volume anônimo existente que contém os dados do banco
    # Para encontrar o nome: docker inspect docker-db --format '{{json .Mounts}}'
    external: true
    name: e516aba4bda627c66c9cdc25d3326200db60d406b8e93598ca60664e580ac910

networks:
  sig_network:
    name: ${DOCKER_NETWORK_NAME:-sig_network}
    driver: bridge
