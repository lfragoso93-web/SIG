name: sig

services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-app_user} -d ${POSTGRES_DB:-sig_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sig_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${APP_DB_USER}:${APP_DB_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      PORT:         3000
      NODE_ENV:     ${NODE_ENV:-production}
      JWT_SECRET:   ${JWT_SECRET}
      JWT_EXPIRES:  ${JWT_EXPIRES:-8h}
      APP_USERNAME: ${APP_USERNAME}
      APP_PASSWORD: ${APP_PASSWORD}
      CORS_ORIGIN:  http://web:3001
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - sig_network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      INTERNAL_API_URL:    http://api:3000
      PORT:                3001
    ports:
      - "${WEB_PORT:-3001}:3001"
    networks:
      - sig_network

volumes:
  postgres_data:

networks:
  sig_network:
    name: ${DOCKER_NETWORK_NAME:-sig_network}
    driver: bridge
