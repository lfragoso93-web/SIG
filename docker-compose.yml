name: sig

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-sig_db}
      POSTGRES_USER:     ${APP_DB_USER:-app_user}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-app_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-app_user} -d ${POSTGRES_DB:-sig_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sig_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner        # usa o estágio final enxuto
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:  postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD:-app_password}@db:5432/${POSTGRES_DB:-sig_db}
      PORT:          ${APP_PORT:-3001}
      NODE_ENV:      ${NODE_ENV:-production}
      JWT_SECRET:    ${JWT_SECRET:-troque_em_producao}
      JWT_EXPIRES:   ${JWT_EXPIRES:-8h}
      APP_USERNAME:  ${APP_USERNAME:-admin}
      APP_PASSWORD:  ${APP_PASSWORD:-troque_em_producao}
      CORS_ORIGIN:   ${CORS_ORIGIN:-*}
    ports:
      - "${APP_PORT:-3001}:3001"
    networks:
      - sig_network

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-sig_postgres_data}

networks:
  sig_network:
    name: ${DOCKER_NETWORK_NAME:-sig_network}
    driver: bridge
