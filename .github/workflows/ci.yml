name: CI

# Quando executar: em todo push ou Pull Request na branch main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar:
    name: Verificar projeto
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Instala o Node.js na versão correta
      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Verifica se package.json e package-lock.json estão sincronizados
      # Este é o passo que teria pego o erro que você teve hoje!
      - name: Instalar dependências (npm ci)
        run: npm ci

      # 4. Verifica se o TypeScript compila sem erros
      - name: Verificar TypeScript
        run: npx tsc --noEmit
